# training_config.yaml -- Configuration for Phase 2: LoRA Fine-Tuning
#
# All values here are consumed by training/lora_trainer.py.
#
# TODO: Adjust lora_r, batch_size, and num_epochs based on your GPU VRAM.
#       Typical guidance for a 16 GB GPU:
#           load_in_4bit: true, batch_size: 4, grad_accum_steps: 4

lora:
  base_model_id:   "meta-llama/Llama-3.2-3B"  # TODO: update to exact HF model ID
  dataset_dir:     "data/processed"
  output_dir:      "models/lora_adapter"
  lora_r:          16        # LoRA rank — higher = more capacity, more VRAM
  lora_alpha:      32        # scaling = lora_alpha / lora_r = 2
  lora_dropout:    0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    # TODO: add "k_proj" and "o_proj" if rank 16 underperforms
  num_epochs:       3
  batch_size:       4
  grad_accum_steps: 4        # effective batch = batch_size * grad_accum_steps = 16
  learning_rate:    2.0e-4
  max_seq_length:   1024
  load_in_4bit:     true     # QLoRA — reduces VRAM from ~6 GB to ~2 GB
  response_template: "### Response:\n"

logging:
  report_to: "none"          # "none" | "wandb" | "tensorboard"
  # TODO: set to "wandb" and set WANDB_PROJECT env var for experiment tracking
  logging_steps: 10

evaluation:
  strategy: "epoch"          # evaluate at end of every epoch
  metric_for_best_model: "eval_loss"
  results_output: "models/lora_adapter/training_results.json"
